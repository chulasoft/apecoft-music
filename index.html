<title>APECOFT MUSIC — Music Realm</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{background:#0a0a0a;overflow:hidden;height:100%}
body{font-family:'Arial Black','Arial Bold',Arial,sans-serif}
#root{height:100vh;height:100dvh;position:relative;overflow:hidden}
button{font-family:inherit;cursor:pointer}
::-webkit-scrollbar{display:none}
@keyframes pulse{0%,100%{opacity:.35}50%{opacity:1}}
@keyframes floaty{0%,100%{transform:translateY(0) rotate(var(--r,0deg))}50%{transform:translateY(-10px) rotate(var(--r,0deg))}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes slideStripes{to{background-position:80px 0}}
@keyframes popIn{0%{transform:scale(.6) skewX(-10deg);opacity:0}70%{transform:scale(1.06) skewX(-10deg)}100%{transform:scale(1) skewX(-10deg);opacity:1}}
@keyframes starSpin{0%{transform:rotate(0deg) scale(1)}50%{transform:rotate(180deg) scale(1.15)}100%{transform:rotate(360deg) scale(1)}}
@keyframes riseUp{0%{transform:translateY(60px) skewX(-6deg);opacity:0}100%{transform:translateY(0) skewX(-6deg);opacity:1}}
@keyframes dropIn{0%{transform:translateY(-70px) rotate(-4deg);opacity:0}70%{transform:translateY(6px) rotate(-2deg)}100%{transform:translateY(0) rotate(-2deg);opacity:1}}
@keyframes slashIn{0%{transform:translateX(-80px) skewX(-18deg);opacity:0}100%{transform:translateX(0) skewX(-8deg);opacity:1}}
@keyframes barIn{0%{transform:translateX(-120px);opacity:0}100%{transform:translateX(0);opacity:1}}
@keyframes ransomPop{0%{transform:scale(0) rotate(var(--rr,0deg));opacity:0}70%{transform:scale(1.15) rotate(var(--rr,0deg))}100%{transform:scale(1) rotate(var(--rr,0deg));opacity:1}}
/* ── artist: SLAM DOWN — zoom out from screen, crash onto the floor with a bounce ── */
@keyframes slamDown{0%{transform:translateY(-160%) scale(2.2) rotate(6deg);opacity:0}55%{transform:translateY(4%) scale(.94) rotate(2.5deg);opacity:1}72%{transform:translateY(-6%) scale(1.02) rotate(2.5deg)}88%{transform:translateY(2%) scale(.99) rotate(2.5deg)}100%{transform:translateY(0) scale(1) rotate(2.5deg);opacity:1}}
@keyframes slamShake{0%,60%{transform:translate(0,0)}64%{transform:translate(-6px,3px)}68%{transform:translate(6px,-2px)}72%{transform:translate(-4px,2px)}76%{transform:translate(3px,-1px)}80%,100%{transform:translate(0,0)}}
/* ── album: SPIN IN — whirl in from top-right corner ── */
@keyframes spinInCorner{0%{transform:translate(160%,-160%) rotate(-220deg) scale(.3);opacity:0}70%{transform:translate(-4%,4%) rotate(8deg) scale(1.05);opacity:1}100%{transform:translate(0,0) rotate(-2deg) scale(1);opacity:1}}
/* ── song cover (SAVE panel): SLIDE-SKID in from left ── */
@keyframes skidIn{0%{transform:translateX(-220%) rotate(-16deg);opacity:0}70%{transform:translateX(6%) rotate(-3deg);opacity:1}100%{transform:translateX(0) rotate(-5deg);opacity:1}}
/* ── story image: SWING in from bottom-left like a thrown card ── */
@keyframes swingIn{0%{transform:translate(-120%,120%) rotate(-40deg) scale(.6);opacity:0}65%{transform:translate(4%,-4%) rotate(2deg) scale(1.04);opacity:1}100%{transform:translate(0,0) rotate(-3deg) scale(1);opacity:1}}
/* ── generic flash used on selection swap ── */
@keyframes coverFlash{0%{filter:brightness(2.6) contrast(1.4)}100%{filter:brightness(1) contrast(1)}}
@keyframes numKick{0%{transform:scale(2.4) rotate(-12deg);opacity:0}60%{transform:scale(.9) rotate(3deg);opacity:1}100%{transform:scale(1) rotate(0deg);opacity:1}}
</style>

function parseCSV(text){
  const rows=[]; let row=[],field="",q=false;
  for(let i=0;i<text.length;i++){const ch=text[i];
    if(q){ if(ch==='"'){ if(text[i+1]==='"'){field+='"';i++;} else q=false; } else field+=ch; }
    else{ if(ch==='"')q=true;
      else if(ch===','){row.push(field);field="";}
      else if(ch==='\n'||ch==='\r'){ if(ch==='\r'&&text[i+1]==='\n')i++;
        row.push(field);field=""; if(row.some(c=>c!==""))rows.push(row); row=[]; }
      else field+=ch; } }
  if(field!==""||row.length){row.push(field); if(row.some(c=>c!==""))rows.push(row);}
  const h=rows.shift();
  return rows.map(r=>Object.fromEntries(h.map((k,i)=>[k.trim(),(r[i]??"").trim()])));
}
async function loadRealmData(){
  try{
    const [a,al,s]=await Promise.all([fetch("data/artists.csv"),fetch("data/albums.csv"),fetch("data/songs.csv")]);
    if(!a.ok||!al.ok||!s.ok)throw 0;
    const [at,alt,st]=await Promise.all([a.text(),al.text(),s.text()]);
    return buildRealm(parseCSV(at),parseCSV(alt),parseCSV(st));
  }catch(e){ console.warn("CSV load failed — demo data.",e); return DEMO_REALM; }
}
function buildRealm(A,AL,S){
  const img=p=>p?p:FALLBACK_IMG;
  const artists=A.map(a=>({id:a.id,name:a.name,role:a.role,tagline:a.tagline,bio:a.bio,
    accent:a.accent,bloom:a.bloom,dark:a.dark,
    tags:(a.tags||"").split("|").filter(Boolean),image:img(a.image),
    stats:{debut:a.debut},albums:[]}));
  const byA=Object.fromEntries(artists.map(a=>[a.id,a]));
  const albums=AL.map(al=>({id:al.id,artistId:al.artist_id,title:al.title,year:al.year,issue:al.issue,
    desc:al.desc,accent:al.accent,bloom1:al.bloom1,bloom2:al.bloom2,
    tags:(al.tags||"").split("|").filter(Boolean),cover:img(al.cover),songs:[]}));
  const byAl=Object.fromEntries(albums.map(al=>[al.id,al]));
  S.forEach(s=>{const al=byAl[s.album_id]; if(!al)return;
    al.songs.push({id:s.id,n:s.n,title:s.title,dur:s.dur,genre:s.genre,
      accent:s.accent,g1:s.g1,g2:s.g2,tags:(s.tags||"").split("|").filter(Boolean),
      desc:s.desc,audioSrc:s.audio||null,
      cover:s.cover?img(s.cover):al.cover,
      story:{title:s.story_title||s.title,
        paragraphs:(s.story_paragraphs||"").split("||").map(p=>p.trim()).filter(Boolean),
        quote:s.story_quote||""}});});
  albums.forEach(al=>{const a=byA[al.artistId]; if(a)a.albums.push(al);});
  artists.forEach(a=>{a.stats.albums=a.albums.length;a.stats.songs=a.albums.reduce((n,al)=>n+al.songs.length,0);});
  return artists.filter(a=>a.albums.length>0);
}

function useIsMobile(){
  const [m,setM]=useState(typeof window!=="undefined"&&window.innerWidth<820);
  useEffect(()=>{const f=()=>setM(window.innerWidth<820);
    window.addEventListener("resize",f);return()=>window.removeEventListener("resize",f);},[]);
  return m;
}

// ═══ AUDIO (with queue support) ═══
function useAudio(){
  const ref=useRef(null);
  const endedCb=useRef(null);
  const [playing,setPlaying]=useState(false);
  const [progress,setProgress]=useState(0);
  const [curSrc,setCurSrc]=useState(null);
  useEffect(()=>{const a=new Audio();ref.current=a;
    a.addEventListener("ended",()=>{setPlaying(false); if(endedCb.current)endedCb.current();});
    a.addEventListener("timeupdate",()=>setProgress(a.duration?a.currentTime/a.duration:0));
    return()=>a.pause();},[]);
  const playSrc=src=>{
    if(!src)return;
    const a=ref.current;a.src=src;setCurSrc(src);
    a.play().then(()=>setPlaying(true)).catch(()=>{});};
  const toggle=src=>{
    if(!src){setPlaying(p=>!p);return;}
    const a=ref.current;
    if(playing&&curSrc===src){a.pause();setPlaying(false);}
    else{ if(src!==curSrc){a.src=src;setCurSrc(src);}
      a.play().then(()=>setPlaying(true)).catch(()=>setPlaying(p=>!p)); } };
  const seek=r=>{const a=ref.current;if(a.duration)a.currentTime=r*a.duration;};
  const setOnEnded=fn=>{endedCb.current=fn;};
  return{playing,progress,curSrc,toggle,seek,playSrc,setOnEnded};
}

function RansomText({text,accent,size=40}){
  const styles=[{bg:WHITE,fg:BLACK},{bg:BLACK,fg:WHITE},{bg:accent,fg:WHITE}];
  let gi=0; // global letter index across whole string (keeps color/rotation pattern)
  return (
    <div style={{display:"flex",flexWrap:"wrap",columnGap:size*.4,rowGap:8,alignItems:"flex-end"}}>
      {text.split(/\s+/).filter(Boolean).map((word,wi)=>{

        return (
          <div key={wi} style={{display:"flex",gap:5,alignItems:"flex-end",flexWrap:"nowrap"}}>
            {word.split("").map((ch,ci)=>{
              const i=start+ci;
              const st=styles[(i*7+3)%3];
              const rot=((i*37)%11)-5;
              return (
                <span key={ci} style={{"--rr":`${rot}deg`,
                  background:st.bg,color:st.fg,
                  fontSize:size+((i*13)%3)*3,fontWeight:900,fontStyle:"italic",
                  textTransform:"uppercase",padding:`0 ${size*.14}px`,
                  transform:`rotate(${rot}deg)`,display:"inline-block",
                  boxShadow:`3px 3px 0 ${st.bg===BLACK?accent:BLACK}`,lineHeight:1.15,
                  animation:`ransomPop .4s ${i*.04}s both cubic-bezier(.3,1.6,.5,1)`}}>{ch}</span>
              );
            })}
          </div>
        );
      })}
    </div>
  );
}

const STRIPE_BG=`repeating-linear-gradient(-45deg, transparent 0 34px, rgba(0,0,0,.25) 34px 40px)`;
function Wipe({phase,variant,color}){
  const RC=color||RED;
  if(variant==="slashUp"){
    const ty=phase==="in"?"0%":phase==="out"?"-165%":"165%";
    return <div style={{position:"fixed",inset:"-20%",zIndex:999,pointerEvents:"none",
      transform:`translateY(${ty}) skewY(-10deg)`,
      transition:phase?"transform .42s cubic-bezier(.7,0,.3,1)":"none",
      background:RC,backgroundImage:STRIPE_BG}}>
      <div style={{position:"absolute",left:"44%",top:"42%",animation:"starSpin 1s linear infinite"}}>
        <Star size={80} color={BLACK}/></div></div>;
  }
  if(variant==="slashLeft"){
    // reverse slash — sweeps in from the RIGHT, exits LEFT (feels like going back)
    const tx=phase==="in"?"0%":phase==="out"?"-175%":"175%";
    return <div style={{position:"fixed",inset:"-20%",zIndex:999,pointerEvents:"none",
      transform:`translateX(${tx}) skewX(14deg)`,
      transition:phase?"transform .42s cubic-bezier(.7,0,.3,1)":"none",
      background:RC,backgroundImage:STRIPE_BG,overflow:"hidden"}}>
      <Star size={80} color={BLACK} style={{position:"absolute",top:"38%",left:"42%",
        animation:"starSpin 1s linear infinite reverse"}}/>
      <Star size={44} color={WHITE} style={{position:"absolute",top:"20%",left:"18%",
        animation:"starSpin 1.3s linear infinite"}}/>
      <Star size={44} color={BLACK} style={{position:"absolute",bottom:"22%",right:"20%",
        animation:"starSpin 1.5s linear infinite reverse"}}/>
    </div>;
  }
  if(variant==="flashUp"){
    const ty=phase==="in"?"0%":phase==="out"?"-115%":"115%";
    return <div style={{position:"fixed",inset:0,zIndex:999,pointerEvents:"none",overflow:"hidden",
      transform:`translateY(${ty})`,
      transition:phase?"transform .4s cubic-bezier(.5,0,.15,1)":"none",
      background:BLACK,borderTop:`12px solid ${RC}`,boxShadow:`0 -16px 0 ${RC}`}}>
      <div style={{position:"absolute",inset:0,opacity:.9,background:RC,
        clipPath:"polygon(0 0, 100% 0, 100% 46%, 0 66%)",backgroundImage:STRIPE_BG}}/>
      <div style={{position:"absolute",inset:0,opacity:.4,
        backgroundImage:"radial-gradient(circle, rgba(255,255,255,.12) 1.5px, transparent 2px)",
        backgroundSize:"14px 14px"}}/>
      <Star size={90} color={RC} style={{position:"absolute",top:"20%",right:"12%",
        animation:"starSpin 1s linear infinite"}}/>
      <Star size={52} color={WHITE} style={{position:"absolute",bottom:"26%",left:"12%",
        animation:"starSpin 1.4s linear infinite reverse"}}/>
      <Star size={30} color={BLACK} style={{position:"absolute",top:"55%",right:"32%",
        animation:"starSpin 1.8s linear infinite"}}/>
    </div>;
  }
  if(variant==="flashDown"){
    const ty=phase==="in"?"0%":phase==="out"?"115%":"-115%";
    return <div style={{position:"fixed",inset:0,zIndex:999,pointerEvents:"none",
      transform:`translateY(${ty})`,
      transition:phase?"transform .34s cubic-bezier(.5,0,.15,1)":"none",
      background:BLACK,borderBottom:`10px solid ${RC}`,boxShadow:`0 14px 0 ${RC}`}}>
      <div style={{position:"absolute",inset:0,opacity:.5,
        backgroundImage:`repeating-linear-gradient(90deg, transparent 0 30px, ${RC}22 30px 34px)`}}/></div>;
  }
  if(variant==="shatter"){
    // top slab flows in from left, out to right; bottom flows in from right, out to left
    const topTx=phase==="in"?"0%":phase==="out"?"120%":"-120%";
    const botTx=phase==="in"?"0%":phase==="out"?"-120%":"120%";
    const ease="transform .46s cubic-bezier(.5,0,.2,1)";
    return <div style={{position:"fixed",inset:0,zIndex:999,pointerEvents:"none",overflow:"hidden"}}>
      <div style={{position:"absolute",top:0,left:0,right:0,height:"53%",
        transform:`translateX(${topTx})`,transition:phase?ease:"none",
        background:RC,backgroundImage:STRIPE_BG,
        clipPath:"polygon(0 0, 100% 0, 100% 76%, 58% 100%, 28% 82%, 0 98%)"}}/>
      <div style={{position:"absolute",bottom:0,left:0,right:0,height:"53%",
        transform:`translateX(${botTx})`,transition:phase?ease:"none",
        background:RC,backgroundImage:STRIPE_BG,
        clipPath:"polygon(28% 0, 68% 18%, 100% 2%, 100% 100%, 0 100%, 0 20%)"}}/>
      <div style={{position:"absolute",top:"46%",left:"50%",
        transform:`translate(-50%,-50%) scale(${phase==="in"?1:0})`,
        transition:phase?"transform .3s cubic-bezier(.3,1.6,.5,1)":"none"}}>
        <div style={{animation:"starSpin .8s linear infinite"}}><Star size={72} color={BLACK}/></div>
      </div>
    </div>;
  }
  if(variant==="irisStar"){
    const scale=phase==="in"?26:0;
    const rot=phase==="in"?90:phase==="out"?260:0;
    return <div style={{position:"fixed",inset:0,zIndex:999,pointerEvents:"none",
      display:"flex",alignItems:"center",justifyContent:"center",overflow:"hidden"}}>
      <div style={{transform:`scale(${scale}) rotate(${rot}deg)`,
        transition:phase?"transform .42s cubic-bezier(.6,0,.25,1)":"none"}}>
        <Star size={60} color={RC}/></div></div>;
  }
  const tx=phase==="in"?"0%":phase==="out"?"165%":"-165%";
  return <div style={{position:"fixed",inset:"-20%",zIndex:999,pointerEvents:"none",
    transform:`translateX(${tx}) skewX(-14deg)`,
    transition:phase?"transform .4s cubic-bezier(.7,0,.3,1)":"none",
    background:RC,backgroundImage:STRIPE_BG}}>
    <div style={{position:"absolute",top:"46%",left:"40%",animation:"starSpin 1s linear infinite"}}>
      <Star size={90} color={BLACK}/></div></div>;
}

              background:`linear-gradient(to top, ${BLACK} 3%, transparent 40%)`}}/>

            <div style={{position:"absolute",top:0,bottom:0,left:0,width:"100%",

        top:isMobile?58:"18%", left:isMobile?"50%":54,
        transform:isMobile?"translateX(-50%) rotate(-4deg)":"rotate(-5deg)",
        zIndex:40,width:isMobile?160:250,
        animation:isMobile?"dropIn .5s cubic-bezier(.3,1.5,.5,1) both":"skidIn .55s cubic-bezier(.3,1.4,.5,1) both"}}>
        <div style={{position:"relative",background:song.accent,padding:"10px 12px 12px 26px",
          border:`3px solid ${BLACK}`,boxShadow:`8px 8px 0 rgba(0,0,0,.85)`,

              animation:"numKick .4s cubic-bezier(.3,1.5,.5,1) both"}}>{song.n}</div>

      </div>

      {/* tilted bar stack */}
      <div style={{position:"absolute",
        top:isMobile?"40%":0,bottom:0,left:0,right:0,
        display:"flex",flexDirection:"column",justifyContent:"center",

        width:"126%",marginLeft:"-13%",zIndex:20,gap:0,
        paddingTop:isMobile?0:20}}>
        {songs.map((s,i)=>{

          return (
            <div key={s.id}
              onClick={()=>isC?onSelectSong(s,i):setCur(i)}
              onMouseEnter={()=>setCur(i)}
              style={{
                background:isC?s.accent:(i%2?WHITE:"#dedede"),
                borderTop:`3px solid ${BLACK}`,borderBottom:`3px solid ${BLACK}`,

                display:"flex",alignItems:"center",
                paddingLeft:isMobile?"20%":"27%",paddingRight:isMobile?"16%":"18%",
                gap:isMobile?12:22,
                cursor:"pointer",position:"relative",
                boxShadow:isC?`0 10px 0 rgba(0,0,0,.5)`:"none",
                zIndex:isC?5:1,
                transition:"all .2s cubic-bezier(.4,1.3,.5,1)",
                animation:`barIn .4s ${.08+i*.06}s both cubic-bezier(.3,1.3,.5,1)`}}>
              {/* No. tag */}
              <div style={{background:BLACK,color:WHITE,
                fontSize:isC?(isMobile?11:14):(isMobile?8:10),
                fontWeight:900,fontStyle:"italic",padding:isC?"4px 10px":"2px 7px",
                transform:"skewX(-14deg)",flexShrink:0,letterSpacing:.5}}>
                <span style={{display:"inline-block",transform:"skewX(14deg)"}}>No.{s.n}</span>
              </div>
              {/* big track title */}
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontSize:isC?(isMobile?18:26):(isMobile?12:15),
                  fontWeight:900,fontStyle:"italic",
                  color:isC?WHITE:BLACK,textTransform:"uppercase",letterSpacing:.5,
                  textShadow:isC?`2px 2px 0 ${BLACK}`:"none",
                  whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis",
                  transform:"skewX(-6deg)"}}>{s.title}</div>
                {isC&&!isMobile&&<div style={{fontSize:9,fontStyle:"italic",

                <span style={{fontSize:isC?(isMobile?13:18):(isMobile?9:12),

                  textShadow:isC?`2px 2px 0 ${BLACK}`:"none"}}>{s.dur}</span>

    </div>
  );

// ═══ STORY — image left / slanted content right ═══

            backgroundImage:"radial-gradient(circle, rgba(0,0,0,.4) 1px, transparent 1.6px)",
            backgroundSize:"5px 5px"}}/>
          {/* big track number — bottom-right, clear of the back button */}
          <div style={{position:"absolute",bottom:isMobile?30:36,right:14,
            fontSize:isMobile?36:52,fontWeight:900,fontStyle:"italic",color:WHITE,
            textShadow:`3px 3px 0 ${BLACK}`,opacity:.92,
            animation:"numKick .5s cubic-bezier(.3,1.5,.5,1) both"}}>{song.n}</div>
          {/* bottom label */}
          <div style={{position:"absolute",bottom:0,left:0,right:0,
            background:`linear-gradient(to top, ${BLACK}f2, transparent)`,padding:"20px 14px 12px"}}>

          animation:"starSpin 4s linear infinite"}}/>
      </div>

  );

  const Content=(
    <div style={{flex:1,minWidth:0,overflowY:"auto",position:"relative",zIndex:3,
      padding:isMobile?"18px 20px 190px":"70px 34px 190px",

      {/* title — ransom style */}
      <div style={{opacity:entered?1:0,transition:"opacity .4s"}}>
        <RansomText text={song.title} accent={song.accent} size={isMobile?20:38}/>
      </div>
      {/* meta bar */}
      <div style={{display:"flex",flexWrap:"wrap",gap:6,marginTop:12,alignItems:"center",
        opacity:entered?1:0,transform:entered?"translateX(0)":"translateX(-20px)",
        transition:"all .4s .1s"}}>
        <div style={{background:BLACK,border:`2px solid ${WHITE}`,color:WHITE,
          fontSize:9.5,fontWeight:900,fontStyle:"italic",padding:"4px 11px",

          <span style={{display:"inline-block",transform:"skewX(10deg)"}}>TRACK {song.n} / {String(N).padStart(2,"0")}</span>
        </div>
        <div style={{background:song.accent,color:WHITE,
          fontSize:9.5,fontWeight:900,fontStyle:"italic",padding:"4px 11px",
          transform:"skewX(-10deg)",letterSpacing:1,boxShadow:`2px 2px 0 ${BLACK}`}}>
          <span style={{display:"inline-block",transform:"skewX(10deg)"}}>{song.genre} · {song.dur}</span>
        </div>
        {song.tags.map(t=><Tag key={t} label={t} accent={song.accent} small/>)}
      </div>

      {/* STORY banner */}
      <div style={{margin:"22px 0 16px",transform:"rotate(-1.5deg)",
        opacity:entered?1:0,transition:"opacity .4s .15s"}}>
        <div style={{display:"inline-block",background:song.accent,padding:"5px 24px",
          clipPath:JAG3,boxShadow:"4px 4px 0 rgba(0,0,0,.85)",transition:"background .4s"}}>
          <span style={{fontSize:14,fontWeight:900,fontStyle:"italic",color:WHITE,
            letterSpacing:3,textTransform:"uppercase",
            textShadow:`2px 2px 0 ${BLACK}`}}>STORY BEHIND</span>
        </div>
      </div>

      {/* paragraphs — alternating skewed panels */}
      {song.story.paragraphs.map((p,i)=>(
        <div key={i} style={{
          marginBottom:14,
          transform:`rotate(${i%2?".5":"-.5"}deg)`,
          opacity:entered?1:0,
          transition:`all .45s ${.2+i*.1}s cubic-bezier(.3,1.3,.5,1)`}}>
          <div style={{background:i%2?"rgba(255,255,255,.06)":WHITE,
            border:`3px solid ${i%2?"rgba(255,255,255,.14)":BLACK}`,

            padding:"15px 20px",clipPath:JAG3,
            display:"flex",gap:14}}>
            <div style={{width:5,flexShrink:0,background:song.accent,
              transform:"skewY(-10deg)"}}/>

        <div style={{position:"relative",margin:"26px 0 0",

          <div style={{position:"absolute",inset:-6,background:WHITE,clipPath:JAG2,
            transform:"rotate(1.4deg)"}}/>
          <div style={{position:"relative",background:song.accent,clipPath:JAG1,
            padding:"24px 28px",transition:"background .4s",
            backgroundImage:"repeating-linear-gradient(-45deg,transparent 0 28px,rgba(0,0,0,.12) 28px 33px)"}}>
            <div style={{fontSize:isMobile?14:19,fontWeight:900,fontStyle:"italic",color:WHITE,
              lineHeight:1.6,textShadow:`2px 2px 0 ${BLACK}`}}>"{song.story.quote}"</div>
            <div style={{marginTop:10,fontSize:10.5,fontWeight:900,fontStyle:"italic",
              color:BLACK,letterSpacing:2,textTransform:"uppercase"}}>— {artist.name}</div>
          </div>
          <Star size={26} color={BLACK} style={{position:"absolute",top:-14,right:-8,zIndex:5}}/>

    <div style={{height:"100%",background:BLACK,position:"relative",overflow:"hidden"}}>

      <BackBtn onClick={onBack} label="Tracks"/>
      {/* accent shard */}
      <div style={{position:"absolute",top:0,left:0,width:"48%",height:"100%",zIndex:0,
        clipPath:"polygon(0 0, 78% 0, 100% 100%, 0 100%)",
        background:song.accent,opacity:.13,transition:"background .5s"}}/>

      <div style={{position:"relative",zIndex:10,height:"100%",
        display:"flex",flexDirection:isMobile?"column":"row",
        overflowY:isMobile?"auto":"hidden"}}>
        {ImagePanel}
        {Content}
      </div>

      {/* PLAYER BAR */}
      <div style={{position:"absolute",bottom:0,left:0,right:0,zIndex:50}}>
        <div style={{height:8,background:song.accent,
          clipPath:"polygon(0 100%, 100% 0, 100% 100%)",transition:"background .4s"}}/>
        <div style={{background:BLACK,borderTop:`3px solid ${song.accent}`,
          padding:"0 18px 16px",transition:"border-color .4s"}}>
          <div style={{width:"100%",height:6,background:"rgba(255,255,255,.1)",
            cursor:"pointer",margin:"11px 0 12px",transform:"skewX(-20deg)"}}
            onClick={e=>{const r=e.currentTarget.getBoundingClientRect();audio.seek((e.clientX-r.left)/r.width);}}>
            <div style={{width:`${audio.progress*100}%`,height:"100%",
              background:song.accent,transition:"width .1s, background .4s",
              boxShadow:`0 0 12px ${song.accent}`}}/>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:12,maxWidth:640,margin:"0 auto"}}>
            <div style={{width:40,height:40,flexShrink:0,position:"relative",transform:"rotate(-3deg)"}}>
              <div style={{position:"absolute",inset:-3,background:song.accent,clipPath:JAG3,transition:"background .4s"}}/>
              <img src={song.cover||album.cover} alt={song.title}
                style={{position:"relative",width:"100%",height:"100%",objectFit:"cover",clipPath:JAG3}}/>
            </div>
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontSize:12,fontWeight:900,fontStyle:"italic",color:WHITE,
                textTransform:"uppercase",letterSpacing:.5,
                whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{song.title}</div>
              <div style={{fontSize:7.5,fontWeight:900,fontStyle:"italic",color:song.accent,
                letterSpacing:1.5,marginTop:2,textTransform:"uppercase",transition:"color .4s"}}>
                {artist.name} · {song.dur}
              </div>
            </div>
            <div style={{display:"flex",alignItems:"center",gap:7}}>
              <button onClick={()=>songIdx>0&&onChangeSong(songIdx-1)}
                style={{background:"transparent",border:`2px solid ${WHITE}`,color:WHITE,
                  width:32,height:32,fontSize:11,fontWeight:900,transform:"skewX(-10deg)",
                  opacity:songIdx===0?.2:.6,
                  display:"flex",alignItems:"center",justifyContent:"center"}}>◂</button>
              <button onClick={()=>audio.toggle(song.audioSrc)}
                style={{background:song.accent,border:`3px solid ${BLACK}`,color:WHITE,
                  width:44,height:44,fontSize:15,fontWeight:900,transform:"skewX(-10deg)",
                  boxShadow:`4px 4px 0 rgba(255,255,255,.15), 0 0 22px ${song.accent}66`,

                  transition:"background .4s, box-shadow .4s"}}>
                <span style={{display:"inline-block",transform:"skewX(10deg)"}}>{isPlaying?"⏸":"▶"}</span>
              </button>
              <button onClick={()=>songIdx<N-1&&onChangeSong(songIdx+1)}
                style={{background:"transparent",border:`2px solid ${WHITE}`,color:WHITE,
                  width:32,height:32,fontSize:11,fontWeight:900,transform:"skewX(-10deg)",
                  opacity:songIdx===N-1?.2:.6,
                  display:"flex",alignItems:"center",justifyContent:"center"}}>▸</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

// ═══ MINI PLAYER — floating control on every screen after the title ═══

    <div style={{position:"absolute",bottom:14,right:16,zIndex:75,
      background:BLACK,border:`2px solid ${WHITE}`,

          <React.Fragment>
            {nowPlaying&&nowPlaying.cover&&(
              <div style={{width:28,height:28,flexShrink:0,position:"relative",transform:"rotate(-3deg)"}}>
                <div style={{position:"absolute",inset:-2,background:accent,clipPath:JAG3}}/>
                <img src={nowPlaying.cover} alt=""
                  style={{position:"relative",width:"100%",height:"100%",objectFit:"cover",clipPath:JAG3}}/>
              </div>

              <div style={{fontSize:9.5,fontWeight:900,fontStyle:"italic",color:WHITE,

                whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>
                {nowPlaying?nowPlaying.title:"NOW PLAYING"}</div>
              {nowPlaying&&<div style={{fontSize:6.5,fontWeight:900,fontStyle:"italic",color:accent,
                letterSpacing:1.2,textTransform:"uppercase",marginTop:1,
                whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{nowPlaying.artist}</div>}
            </div>
            <button onClick={()=>audio.toggle(audio.curSrc)}
              style={{background:accent,border:`2px solid ${WHITE}`,color:WHITE,
                width:30,height:30,fontSize:11,fontWeight:900,transform:"skewX(-8deg)",flexShrink:0,
                display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",
                boxShadow:`2px 2px 0 rgba(0,0,0,.6)`}}>
              <span style={{display:"inline-block",transform:"skewX(8deg)"}}>{audio.playing?"⏸":"▶"}</span>
            </button>
          </React.Fragment>
        ):(
          <React.Fragment>
            <span style={{fontSize:8.5,fontWeight:900,fontStyle:"italic",color:WHITE,
              letterSpacing:2,textTransform:"uppercase",opacity:.7}}>BGM</span>
            <button onClick={onToggleBg}
              style={{background:bgOn?RED:"transparent",border:`2px solid ${WHITE}`,color:WHITE,
                width:30,height:30,fontSize:12,fontWeight:900,transform:"skewX(-8deg)",
                display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",
                opacity:bgOn?1:.55,boxShadow:bgOn?`2px 2px 0 rgba(0,0,0,.6)`:"none"}}>
              <span style={{display:"inline-block",transform:"skewX(8deg)"}}>{bgOn?"♪":"✕"}</span>
            </button>
          </React.Fragment>
        )}
      </div>
    </div>
  );
}

function App(){
  const [realm,setRealm]=useState(null);
  const [screen,setScreen]=useState("title");
  const [artist,setArtist]=useState(null);
  const [album,setAlbum]=useState(null);
  const [song,setSong]=useState(null);
  const [songIdx,setSongIdx]=useState(0);
  const [wipe,setWipe]=useState(null);
  const [wipeVar,setWipeVar]=useState("slashRight");
  const [wipeColor,setWipeColor]=useState(RED);
  const pending=useRef({});
  const queue=useRef([]);
  const audio=useAudio();
  const bgMusic=useRef(null);
  const bgStarted=useRef(false);
  const [bgMuted,setBgMuted]=useState(false);

  useEffect(()=>{loadRealmData().then(setRealm);},[]);
  useEffect(()=>{
    audio.setOnEnded(()=>{
      if(queue.current.length){ audio.playSrc(queue.current.shift()); }
    });
  },[]);

  // background intro music: quiet loop while no track is playing
  useEffect(()=>{
    const bg=new Audio("audio/bgintro.mp3");
    bg.loop=true; bg.volume=0.18;
    bgMusic.current=bg;
    return()=>bg.pause();
  },[]);
  useEffect(()=>{
    const bg=bgMusic.current;
    if(!bg||!bgStarted.current)return;
    if(audio.playing||bgMuted) bg.pause();
    else bg.play().catch(()=>{});
  },[audio.playing,bgMuted]);
  const startBgMusic=()=>{
    if(bgStarted.current)return;
    bgStarted.current=true;
    const bg=bgMusic.current;
    if(bg&&!audio.playing&&!bgMuted) bg.play().catch(()=>{});
  };
  const toggleBg=()=>{
    if(!bgStarted.current){bgStarted.current=true;}
    setBgMuted(m=>!m);
  };
  // find the song object matching whatever the audio element is holding
  const nowPlaying=React.useMemo(()=>{
    if(!realm||!audio.curSrc)return null;
    for(const a of realm)for(const al of a.albums)for(const s of al.songs)
      if(s.audioSrc===audio.curSrc)
        return {title:s.title,artist:a.name,cover:s.cover||al.cover,accent:s.accent};
    return null;
  },[realm,audio.curSrc]);

  const TRANSITIONS={artists:"slashRight",albums:"flashUp",songs:"shatter",story:"irisStar",title:"flashDown"};
  const DEPTH={title:0,artists:1,albums:2,songs:3,story:4};
  const colorFor=(next,p,back)=>{
    if(!back){
      if(p.song)return p.song.accent;
      if(p.album)return p.album.accent;
      if(p.artist)return p.artist.accent;
    }
    if(next==="albums"&&album)return album.accent;
    if(next==="albums"&&artist)return artist.accent;
    if(next==="artists"&&artist)return artist.accent;
    if(next==="songs"&&album)return album.accent;
    return RED;
  };
  const goTo=(next,payload={})=>{
    pending.current=payload;
    // going to a shallower screen = "back" → reverse slash
    const back=(DEPTH[next]??0)<(DEPTH[screen]??0);
    setWipeVar(back?"slashLeft":(TRANSITIONS[next]||"slashRight"));
    setWipeColor(colorFor(next,payload,back));
    setWipe("in");
    setTimeout(()=>{
      const p=pending.current;
      if(p.artist!==undefined)setArtist(p.artist);
      if(p.album!==undefined)setAlbum(p.album);
      if(p.song!==undefined){setSong(p.song);setSongIdx(p.songIdx??0);}
      pending.current={};
      setScreen(next);
      setWipe("out");
      setTimeout(()=>setWipe(null),480);
    },440);
  };

  const changeSong=idx=>{const s=album.songs[idx];setSong(s);setSongIdx(idx);};
  const playAlbum=()=>{
    if(!album)return;
    const srcs=album.songs.map(s=>s.audioSrc).filter(Boolean);
    if(!srcs.length){audio.toggle(null);return;}
    queue.current=srcs.slice(1);
    audio.playSrc(srcs[0]);
  };

  if(!realm)return <LoadingScreen/>;

  return (
    <div style={{position:"relative",height:"100%",background:BLACK,overflow:"hidden"}}>
      {screen==="title"&&<TitleScreen onEnter={()=>{startBgMusic();goTo("artists");}}/>}
      {screen==="artists"&&<ArtistSelect artists={realm}
        onSelect={a=>goTo("albums",{artist:a})} onBack={()=>goTo("title")}/>}
      {screen==="albums"&&artist&&<AlbumSelect artist={artist}
        onSelect={al=>goTo("songs",{album:al})} onBack={()=>goTo("artists")}/>}
      {screen==="songs"&&album&&<SongSelect artist={artist} album={album} audio={audio}
        onSelectSong={(s,i)=>goTo("story",{song:s,songIdx:i})}
        onPlayAlbum={playAlbum}
        onBack={()=>goTo("albums")}/>}
      {screen==="story"&&song&&<StoryPage artist={artist} album={album} song={song}
        songIdx={songIdx} onBack={()=>goTo("songs")} onChangeSong={changeSong} audio={audio}/>}
      {screen!=="title"&&screen!=="story"&&(
        <MiniPlayer audio={audio} nowPlaying={nowPlaying}
          bgOn={bgStarted.current&&!bgMuted&&!audio.playing} onToggleBg={toggleBg}/>
      )}
      <Wipe phase={wipe} variant={wipeVar} color={wipeColor}/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
